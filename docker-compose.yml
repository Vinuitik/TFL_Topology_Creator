services:
  llm-pipeline:
    build:
      context: .
      dockerfile: llm_pipeline/Dockerfile
    container_name: llm-pipeline
    working_dir: /app/llm_pipeline
    command: ["python", "agent.py"]
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull deepseek-r1:7b && wait"]

volumes:
  ollama_data:

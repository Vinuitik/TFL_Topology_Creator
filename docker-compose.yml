services:
  llm-pipeline:
    build:
      context: .
      dockerfile: llm_pipeline/Dockerfile
    container_name: llm-pipeline
    working_dir: /app/llm_pipeline
    command: ["python", "agent.py"]
    environment:
      OLLAMA_MODEL: gemma4:e4b
      OLLAMA_EMBED_MODEL: gemma4:e4b
      OLLAMA_TIMEOUT_SEC: 45
      OLLAMA_MAX_RETRIES: 2
      OLLAMA_BACKOFF_SEC: 2
      HF_HOME: /app/.hf_cache
      TRANSFORMERS_CACHE: /app/.hf_cache
    volumes:
      - ./:/app
    depends_on:
      - ollama
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    build:
      context: .
      dockerfile: ollama/Dockerfile
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
  redis_data:

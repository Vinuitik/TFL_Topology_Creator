services:
  llm-pipeline:
    build:
      context: .
      dockerfile: llm_pipeline/Dockerfile
    container_name: llm-pipeline
    working_dir: /app/llm_pipeline
    command: ["python", "agent.py"]
    environment:
      OLLAMA_MODEL: gemma2:2b
      OLLAMA_ENTITY_MODEL: qwen2.5:1.5b
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_TIMEOUT_SEC: 3600
      OLLAMA_MAX_RETRIES: 2
      OLLAMA_BACKOFF_SEC: 2
      HF_HOME: /app/.hf_cache
      TRANSFORMERS_CACHE: /app/.hf_cache
      CHUNK_MAX_WORDS: 600
    volumes:
      - ./:/app
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    build:
      context: .
      dockerfile: ollama/Dockerfile
    container_name: ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  ollama_data:
  redis_data:
